<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订阅链接二维码生成器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: #0a0a0f;
            color: #e4e4e7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 24px;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4aa, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 13px;
            color: #71717a;
        }

        .card {
            background-color: #12121a;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #27272a;
        }

        .input-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #71717a;
            margin-bottom: 8px;
        }

        .paste-btn {
            padding: 4px 10px;
            background-color: rgba(0, 212, 170, 0.15);
            border: 1px solid rgba(0, 212, 170, 0.3);
            border-radius: 6px;
            color: #00d4aa;
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .paste-btn:hover {
            background-color: rgba(0, 212, 170, 0.25);
            border-color: #00d4aa;
        }

        .paste-btn:active {
            transform: scale(0.95);
        }

        .paste-btn svg {
            width: 14px;
            height: 14px;
        }

        .input-area {
            width: 100%;
            min-height: 120px;
            padding: 14px;
            background-color: #1a1a24;
            border: 1px solid #27272a;
            border-radius: 8px;
            color: #e4e4e7;
            font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
            font-size: 13px;
            resize: none;
            transition: all 0.2s ease;
        }

        .input-area:focus {
            outline: none;
            border-color: #00d4aa;
            box-shadow: 0 0 0 2px rgba(0, 212, 170, 0.2);
        }

        .input-area::placeholder {
            color: #52525b;
        }

        .input-area::-webkit-scrollbar {
            width: 6px;
        }

        .input-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .input-area::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        .input-area::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        .input-area::-webkit-resizer {
            display: none;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .generate-btn {
            flex: 1;
            height: 48px;
            background: linear-gradient(135deg, #00d4aa, #6366f1);
            border: none;
            border-radius: 8px;
            color: #0a0a0f;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .generate-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .generate-btn:active {
            transform: scale(0.98);
        }

        .clear-btn {
            flex: 0 0 auto;
            width: 48px;
            height: 48px;
            background-color: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 8px;
            color: #71717a;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .clear-btn svg {
            width: 18px;
            height: 18px;
            transition: all 0.2s ease;
        }

        .clear-btn:hover {
            background-color: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.4);
            color: #ef4444;
        }

        .clear-btn:hover svg {
            transform: scale(1.1);
        }

        .clear-btn:active {
            transform: scale(0.95);
        }

        .result-area {
            margin-top: 24px;
            display: none;
        }

        .result-area.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .qr-item {
            background-color: #1a1a24;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #27272a;
        }

        .qr-item:last-child {
            margin-bottom: 0;
        }

        .qr-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .qr-index {
            font-size: 12px;
            color: #00d4aa;
            font-weight: 500;
        }

        .qr-link {
            font-size: 11px;
            color: #71717a;
            font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
        }

        .qr-link:hover {
            color: #00d4aa;
        }

        .qr-wrapper {
            display: flex;
            justify-content: center;
            padding: 16px;
            background-color: #ffffff;
            border-radius: 6px;
        }

        .qr-wrapper canvas {
            max-width: 100%;
            height: auto;
            display: block !important;
        }

        .qr-wrapper img {
            display: none !important;
        }

        .download-btn {
            background-color: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.3) !important;
        }

        .download-btn:hover {
            border-color: #6366f1 !important;
            color: #6366f1 !important;
        }

        .qr-actions {
            margin-top: 12px;
            display: flex;
            justify-content: center;
        }

        .copy-btn {
            padding: 6px 16px;
            background-color: transparent;
            border: 1px solid #27272a;
            border-radius: 4px;
            color: #71717a;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            border-color: #00d4aa;
            color: #00d4aa;
        }

        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background-color: #00d4aa;
            color: #0a0a0f;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 13px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .empty-tip {
            text-align: center;
            color: #52525b;
            font-size: 13px;
            padding: 20px;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #27272a;
        }

        .footer p {
            font-size: 12px;
            color: #52525b;
        }

        .footer a {
            color: #00d4aa;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer a:hover {
            color: #6366f1;
        }

        .github-icon {
            width: 14px;
            height: 14px;
            margin-right: 4px;
            vertical-align: middle;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>订阅链接二维码生成器</h1>
            <p>支持 Clash / Surge / Shadowrocket / Quantumult</p>
        </div>

        <div class="card">
            <div class="input-label">
                <span>订阅链接</span>
                <button class="paste-btn" id="paste-btn" title="从剪贴板粘贴">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                    </svg>
                    粘贴
                </button>
            </div>
            <textarea
                id="sub-input"
                class="input-area"
                placeholder="粘贴 Clash / Surge / Shadowrocket 订阅链接...
支持多行输入，每行一个链接"></textarea>
            <div class="btn-group">
                <button class="generate-btn" id="generate-btn">生成二维码</button>
                <button class="clear-btn" id="clear-btn" title="清空内容">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                </button>
            </div>

            <div class="result-area" id="result-area">
                <!-- 二维码将在这里生成 -->
            </div>
        </div>

        <footer class="footer">
            <p>&copy; 2026 <a href="https://github.com/Ekko7778" target="_blank"><svg class="github-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>Ekko</a> · MIT License</p>
        </footer>
    </div>

    <div class="toast" id="toast">已复制到剪贴板</div>

    <!-- qrcode-generator: 支持超长内容的二维码库 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <script>
        const inputEl = document.getElementById('sub-input');
        const btnEl = document.getElementById('generate-btn');
        const resultArea = document.getElementById('result-area');
        const toast = document.getElementById('toast');

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('已复制到剪贴板');
            }).catch(() => {
                showToast('复制失败');
            });
        }

        function createQRItem(text, index, total) {
            const item = document.createElement('div');
            item.className = 'qr-item';

            // 截断显示的链接
            const displayUrl = text.length > 40 ? text.substring(0, 40) + '...' : text;

            item.innerHTML = `
                <div class="qr-header">
                    <span class="qr-index">链接 ${index}${total > 1 ? '/' + total : ''}</span>
                    <span class="qr-link" title="${text}">${displayUrl}</span>
                </div>
                <div class="qr-wrapper" id="qr-wrapper-${index}"></div>
                <div class="qr-actions">
                    <button class="copy-btn">复制链接</button>
                    <button class="copy-btn download-btn" style="margin-left: 8px;">下载图片</button>
                </div>
            `;

            const wrapper = item.querySelector(`#qr-wrapper-${index}`);

            try {
                // 使用 qrcode-generator 库，支持超长内容
                // typeNumber: 0 表示自动选择合适的版本
                // errorCorrectionLevel: 'L' 低纠错级别，容纳更多数据
                const qr = qrcode(0, 'L');
                qr.addData(text);
                qr.make();

                // 创建 canvas 绘制二维码
                const moduleCount = qr.getModuleCount();
                const cellSize = Math.max(2, Math.floor(300 / moduleCount));
                const size = moduleCount * cellSize;

                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');

                // 绘制白色背景
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, size, size);

                // 绘制二维码模块
                ctx.fillStyle = '#000000';
                for (let row = 0; row < moduleCount; row++) {
                    for (let col = 0; col < moduleCount; col++) {
                        if (qr.isDark(row, col)) {
                            ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
                        }
                    }
                }

                wrapper.appendChild(canvas);
            } catch (err) {
                wrapper.innerHTML = `
                    <div style="color: #ef4444; padding: 20px; text-align: center; font-size: 13px;">
                        二维码生成失败<br>
                        <span style="font-size: 11px; color: #71717a;">${err.message || '内容过长或包含不支持的字符'}</span>
                    </div>
                `;
                console.error('QRCode generation error:', err);
            }

            // 复制按钮事件
            const copyBtn = item.querySelector('.copy-btn');
            copyBtn.addEventListener('click', () => copyToClipboard(text));

            // 下载按钮事件
            const downloadBtn = item.querySelector('.download-btn');
            downloadBtn.addEventListener('click', () => {
                const canvas = wrapper.querySelector('canvas');
                if (canvas) {
                    const link = document.createElement('a');
                    link.download = `qrcode-${index}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    showToast('图片已下载');
                }
            });

            // 点击链接也可复制
            const linkEl = item.querySelector('.qr-link');
            linkEl.addEventListener('click', () => copyToClipboard(text));

            return item;
        }

        function generateQR() {
            const text = inputEl.value.trim();

            if (!text) {
                showToast('请输入订阅链接');
                return;
            }

            // 分割多行
            const links = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);

            if (links.length === 0) {
                showToast('请输入有效的链接');
                return;
            }

            // 清空结果区域
            resultArea.innerHTML = '';
            resultArea.classList.add('active');

            // 为每个链接生成二维码
            links.forEach((link, idx) => {
                const qrItem = createQRItem(link, idx + 1, links.length);
                resultArea.appendChild(qrItem);
            });
        }

        btnEl.addEventListener('click', generateQR);

        // 清空按钮
        const clearBtnEl = document.getElementById('clear-btn');
        clearBtnEl.addEventListener('click', () => {
            inputEl.value = '';
            resultArea.innerHTML = '';
            resultArea.classList.remove('active');
            inputEl.focus();
        });

        // 支持 Ctrl+Enter 提交
        inputEl.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                generateQR();
            }
        });

        // 粘贴按钮功能
        const pasteBtn = document.getElementById('paste-btn');
        pasteBtn.addEventListener('click', async () => {
            try {
                const clipText = await navigator.clipboard.readText();
                if (clipText) {
                    // 如果输入框已有内容，追加到后面；否则直接填充
                    if (inputEl.value.trim()) {
                        inputEl.value = inputEl.value.trim() + '\n' + clipText;
                    } else {
                        inputEl.value = clipText;
                    }
                    showToast('已从剪贴板粘贴');
                    inputEl.focus();
                } else {
                    showToast('剪贴板为空');
                }
            } catch (err) {
                // 权限被拒绝或不支持
                showToast('无法访问剪贴板，请手动粘贴');
            }
        });
    </script>
</body>
</html>
