<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubQR Hub - 订阅链接二维码生成器</title>
    <!-- Favicon - QR Code Style -->
    <link rel="icon" type="image/svg+xml" href="qr.svg">
    <link rel="preconnect" href="https://fonts.loli.net">
    <link rel="preconnect" href="https://fonts.gstatic.loli.net" crossorigin>
    <link rel="preconnect" href="https://cdn.bootcdn.net">
    <link href="https://fonts.loli.net/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-cyan: #22d3ee;
            --primary-violet: #a78bfa;
            --primary-rose: #fb7185;
            --bg-dark: #09090b;
            --bg-card: rgba(24, 24, 27, 0.7);
            --bg-input: rgba(9, 9, 11, 0.6);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-glow: rgba(34, 211, 238, 0.3);
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #52525b;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 48px 24px;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
            scrollbar-gutter: stable;
        }

        /* 隐藏滚动条但保持滚动功能 */
        body::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        /* 动态背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% -20%, rgba(34, 211, 238, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(167, 139, 250, 0.12), transparent),
                radial-gradient(ellipse 40% 30% at 50% 50%, rgba(251, 113, 133, 0.05), transparent);
            pointer-events: none;
            z-index: 0;
        }

        /* 网格背景 */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 1;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--primary-cyan) 0%, var(--primary-violet) 50%, var(--primary-rose) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            position: relative;
        }

        .header h1::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-cyan), var(--primary-violet), transparent);
            border-radius: 2px;
        }

        .header p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 16px;
        }

        /* 主卡片 - 玻璃拟态 */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 28px;
            border: 1px solid var(--border-subtle);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                0 20px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 100px -20px rgba(34, 211, 238, 0.1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        }

        /* 输入区域标签 */
        .input-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            font-weight: 500;
        }

        /* 快捷键提示 */
        .shortcut-hint {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .shortcut-hint kbd {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 22px;
            height: 20px;
            padding: 0 6px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-subtle);
            border-radius: 4px;
            font-family: "JetBrains Mono", "Fira Code", monospace;
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* 粘贴按钮 */
        .paste-btn {
            padding: 6px 12px;
            background: linear-gradient(135deg, rgba(34, 211, 238, 0.1), rgba(167, 139, 250, 0.1));
            border: 1px solid rgba(34, 211, 238, 0.2);
            border-radius: 8px;
            color: var(--primary-cyan);
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 5px;
            position: relative;
            overflow: hidden;
        }

        .paste-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .paste-btn:hover::before {
            left: 100%;
        }

        .paste-btn:hover {
            background: linear-gradient(135deg, rgba(34, 211, 238, 0.2), rgba(167, 139, 250, 0.2));
            border-color: var(--primary-cyan);
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.2);
            transform: translateY(-1px);
        }

        .paste-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .paste-btn svg {
            width: 14px;
            height: 14px;
        }

        /* 输入框 */
        .input-wrapper {
            position: relative;
            border-radius: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: rgba(34, 211, 238, 0.4);
            box-shadow:
                0 0 0 3px rgba(34, 211, 238, 0.1),
                0 0 30px rgba(34, 211, 238, 0.1);
        }

        .input-area {
            width: 100%;
            min-height: 130px;
            padding: 16px;
            background: transparent;
            border: none;
            border-radius: 12px;
            color: var(--text-primary);
            font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
            font-size: 13px;
            resize: none;
            transition: all 0.2s ease;
        }

        .input-area:focus {
            outline: none;
        }

        .input-area::placeholder {
            color: var(--text-muted);
        }

        .input-area::-webkit-scrollbar {
            width: 6px;
        }

        .input-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .input-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .input-area::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .input-area::-webkit-resizer {
            display: none;
        }

        /* 按钮组 */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        /* 生成按钮 */
        .generate-btn {
            flex: 1;
            height: 52px;
            background: linear-gradient(135deg, var(--primary-cyan) 0%, var(--primary-violet) 100%);
            border: none;
            border-radius: 12px;
            color: #09090b;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .generate-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s ease;
        }

        .generate-btn:hover::before {
            left: 100%;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow:
                0 10px 30px -10px rgba(34, 211, 238, 0.5),
                0 0 40px rgba(167, 139, 250, 0.3);
        }

        .generate-btn:active {
            transform: translateY(0) scale(0.98);
        }

        /* 清空按钮 */
        .clear-btn {
            flex: 0 0 auto;
            width: 52px;
            height: 52px;
            background: rgba(251, 113, 133, 0.08);
            border: 1px solid rgba(251, 113, 133, 0.15);
            border-radius: 12px;
            color: var(--text-muted);
            font-family: inherit;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .clear-btn svg {
            width: 20px;
            height: 20px;
            transition: all 0.25s ease;
        }

        .clear-btn:hover {
            background: rgba(251, 113, 133, 0.15);
            border-color: rgba(251, 113, 133, 0.3);
            color: var(--primary-rose);
            box-shadow: 0 0 20px rgba(251, 113, 133, 0.15);
        }

        .clear-btn:hover svg {
            transform: scale(1.1) rotate(-5deg);
        }

        .clear-btn:active {
            transform: scale(0.95);
        }

        /* 结果区域 */
        .result-area {
            margin-top: 28px;
            display: none;
        }

        .result-area.active {
            display: block;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 二维码卡片 */
        .qr-item {
            background: rgba(9, 9, 11, 0.5);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border-subtle);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .qr-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(34, 211, 238, 0.2), transparent);
        }

        .qr-item:hover {
            border-color: rgba(34, 211, 238, 0.2);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.3);
        }

        .qr-item:last-child {
            margin-bottom: 0;
        }

        .qr-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
        }

        .qr-index {
            font-size: 12px;
            color: var(--primary-cyan);
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .qr-header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            justify-content: flex-end;
        }

        .qr-link {
            font-size: 12px;
            color: var(--text-secondary);
            font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 5px 10px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-subtle);
            letter-spacing: 0.02em;
        }

        .qr-link:hover {
            color: var(--primary-cyan);
            background: rgba(34, 211, 238, 0.1);
            border-color: rgba(34, 211, 238, 0.3);
        }

        .download-btn {
            width: 32px;
            height: 32px;
            padding: 0;
            background: transparent;
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .download-btn:hover {
            border-color: rgba(167, 139, 250, 0.4);
            color: var(--primary-violet);
            background: rgba(167, 139, 250, 0.1);
            transform: translateY(-1px);
        }

        .download-btn:active {
            transform: translateY(0) scale(0.95);
        }

        .download-btn svg {
            width: 16px;
            height: 16px;
        }

        /* 二维码容器 */
        .qr-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border-radius: 12px;
            box-shadow:
                0 0 0 1px rgba(0, 0, 0, 0.05),
                0 10px 30px -5px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            cursor: pointer;
        }

        /* 二维码 hover 效果：浮起 + 青色发光边框 */
        .qr-wrapper:hover {
            transform: translateY(-4px);
            box-shadow:
                0 0 0 2px rgba(34, 211, 238, 0.5),
                0 0 20px rgba(34, 211, 238, 0.15),
                0 0 40px rgba(34, 211, 238, 0.08),
                0 20px 40px -10px rgba(0, 0, 0, 0.15);
        }

        /* 悬停提示：点击放大 - 居中显示 */
        .qr-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            opacity: 0;
            transition: opacity 0.25s ease;
            pointer-events: none;
        }

        .qr-wrapper::after {
            content: '点击放大';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px 20px;
            border-radius: 10px;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .qr-wrapper:hover::before {
            opacity: 1;
        }

        .qr-wrapper:hover::after {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .qr-wrapper canvas {
            max-width: 100%;
            height: auto;
            display: block !important;
        }

        .qr-wrapper img {
            display: none !important;
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            top: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: linear-gradient(135deg, var(--primary-cyan), var(--primary-violet));
            color: #09090b;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            box-shadow:
                0 10px 40px -10px rgba(34, 211, 238, 0.5),
                0 0 60px rgba(167, 139, 250, 0.3);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* 二维码灯罩效果 (Lightbox) */
        .qr-lightbox {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0);
            backdrop-filter: blur(0);
            -webkit-backdrop-filter: blur(0);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .qr-lightbox.active {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            opacity: 1;
            visibility: visible;
        }

        .qr-lightbox-content {
            position: relative;
            transform: scale(0.7);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: default;
        }

        .qr-lightbox.active .qr-lightbox-content {
            transform: scale(1);
        }

        .qr-lightbox-canvas {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border-radius: 16px;
            padding: 24px;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.1),
                0 25px 80px -10px rgba(0, 0, 0, 0.6),
                0 0 120px rgba(34, 211, 238, 0.15),
                0 0 120px rgba(167, 139, 250, 0.1);
        }

        .qr-lightbox-canvas canvas {
            display: block;
            max-width: 80vw;
            max-height: 80vh;
        }

        .qr-lightbox-hint {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-secondary);
            opacity: 0.8;
        }

        /* 页脚 */
        .footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid var(--border-subtle);
        }

        .footer p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--primary-cyan);
            text-decoration: none;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            vertical-align: middle;
        }

        .footer a:hover {
            color: var(--primary-violet);
        }

        .github-icon {
            width: 14px;
            height: 14px;
            fill: currentColor;
            margin-top: -2px;
        }

        /* 错误状态 */
        .error-message {
            color: var(--primary-rose);
            padding: 24px;
            text-align: center;
            font-size: 13px;
        }

        .error-message small {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            body {
                padding: 32px 16px;
            }

            .card {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            /* 移动端隐藏快捷键提示 */
            .shortcut-hint {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SubQR Hub</h1>
            <p>支持 Clash / v2rayN / Surge / Shadowrocket / Quantumult</p>
        </div>

        <div class="card">
            <div class="input-label">
                <span id="input-label-text">订阅链接</span>
                <button class="paste-btn" id="paste-btn" title="从剪贴板粘贴" aria-label="从剪贴板粘贴">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                    </svg>
                    粘贴
                </button>
            </div>
            <div class="input-wrapper">
                <textarea
                    id="sub-input"
                    class="input-area"
                    placeholder="点击粘贴或Ctrl+V 填入订阅链接...&#10;支持Enter多行输入，每行一个链接生成多个二维码"
                    aria-label="订阅链接输入框"
                    aria-describedby="input-hint"></textarea>
            </div>
            <div class="shortcut-hint" id="input-hint">
                <span>快捷键：</span>
                <kbd>Ctrl</kbd>
                <span>+</span>
                <kbd>Enter</kbd>
                <span>生成二维码</span>
            </div>
            <div class="btn-group" role="group" aria-label="操作按钮">
                <button class="generate-btn" id="generate-btn" aria-label="生成二维码">生成二维码</button>
                <button class="clear-btn" id="clear-btn" title="清空内容" aria-label="清空所有内容">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                </button>
            </div>

            <div class="result-area" id="result-area" role="region" aria-label="二维码生成结果" aria-live="polite">
                <!-- 二维码将在这里生成 -->
            </div>
        </div>

        <footer class="footer">
            <p>&copy; 2026 <a href="https://github.com/Ekko7778" target="_blank"><svg class="github-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>Ekko7778</a> · MIT License</p>
        </footer>
    </div>

    <div class="toast" id="toast" role="alert" aria-live="polite">已复制到剪贴板</div>

    <!-- 二维码灯罩 (Lightbox) -->
    <div class="qr-lightbox" id="qr-lightbox" role="dialog" aria-modal="true" aria-label="二维码预览">
        <div class="qr-lightbox-content">
            <canvas class="qr-lightbox-canvas" id="lightbox-canvas"></canvas>
            <p class="qr-lightbox-hint">点击空白处关闭</p>
        </div>
    </div>

    <!-- qrcode-generator: 支持超长内容的二维码库 -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script>
        const inputEl = document.getElementById('sub-input');
        const btnEl = document.getElementById('generate-btn');
        const resultArea = document.getElementById('result-area');
        const toast = document.getElementById('toast');

        // Toast 防抖处理：防止快速连续调用时的问题
        let toastTimer = null;
        function showToast(message) {
            // 清除之前的定时器，避免 Toast 被提前隐藏
            if (toastTimer) {
                clearTimeout(toastTimer);
                toastTimer = null;
            }
            toast.textContent = message;
            toast.classList.add('show');
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
                toastTimer = null;
            }, 2000);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('已复制到剪贴板');
            }).catch(() => {
                showToast('复制失败');
            });
        }

        // ========== Lightbox 灯罩效果 ==========
        const lightbox = document.getElementById('qr-lightbox');
        const lightboxCanvas = document.getElementById('lightbox-canvas');

        // 打开灯罩
        function openLightbox(sourceCanvas) {
            if (!sourceCanvas) return;

            // 复制 canvas 到 lightbox
            const ctx = lightboxCanvas.getContext('2d');
            lightboxCanvas.width = sourceCanvas.width;
            lightboxCanvas.height = sourceCanvas.height;
            ctx.drawImage(sourceCanvas, 0, 0);

            // 显示 lightbox
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // 关闭灯罩
        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        // 点击背景关闭
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });

        // ESC 键关闭
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                closeLightbox();
            }
        });
        // ========== Lightbox 结束 ==========

        function createQRItem(text, index, total) {
            const item = document.createElement('div');
            item.className = 'qr-item';
            item.style.animationDelay = `${(index - 1) * 0.1}s`;

            // 截断显示的链接
            const displayUrl = text.length > 35 ? text.substring(0, 35) + '...' : text;

            // 使用安全的 DOM 操作，避免 XSS
            const header = document.createElement('div');
            header.className = 'qr-header';

            const indexSpan = document.createElement('span');
            indexSpan.className = 'qr-index';
            indexSpan.textContent = `链接 ${index}${total > 1 ? ' / ' + total : ''}`;

            const linkSpan = document.createElement('span');
            linkSpan.className = 'qr-link';
            linkSpan.setAttribute('title', text);
            linkSpan.setAttribute('role', 'button');
            linkSpan.setAttribute('tabindex', '0');
            linkSpan.setAttribute('aria-label', '点击复制链接');
            linkSpan.textContent = displayUrl;

            // 右侧区域：链接 + 下载按钮
            const headerRight = document.createElement('div');
            headerRight.className = 'qr-header-right';

            const downloadBtn = document.createElement('button');
            downloadBtn.className = 'download-btn';
            downloadBtn.setAttribute('aria-label', '下载二维码图片');
            downloadBtn.setAttribute('title', '下载二维码');
            downloadBtn.innerHTML = `
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
            `;

            headerRight.appendChild(linkSpan);
            headerRight.appendChild(downloadBtn);

            header.appendChild(indexSpan);
            header.appendChild(headerRight);

            const wrapper = document.createElement('div');
            wrapper.className = 'qr-wrapper';
            wrapper.setAttribute('aria-label', '二维码图片');

            item.appendChild(header);
            item.appendChild(wrapper);

            try {
                // 使用 qrcode-generator 库，支持超长内容
                // typeNumber: 0 表示自动选择合适的版本
                // errorCorrectionLevel: 'L' 低纠错级别，容纳更多数据
                // 'Byte' 模式：支持 UTF-8 编码，正确处理中文等多字节字符
                const qr = qrcode(0, 'L');

                // 将文本转换为 UTF-8 字节数组，确保中文正确编码
                // 使用 TextEncoder API（现代浏览器均支持）
                const utf8Encoder = new TextEncoder();
                const utf8Bytes = utf8Encoder.encode(text);

                // 将字节数组转换为字符串形式传递给二维码库
                // 使用数组 + join 代替字符串拼接，避免移动端内存问题
                const byteChars = new Array(utf8Bytes.length);
                for (let i = 0; i < utf8Bytes.length; i++) {
                    byteChars[i] = String.fromCharCode(utf8Bytes[i]);
                }
                const byteString = byteChars.join('');

                qr.addData(byteString, 'Byte');
                qr.make();

                // 创建 canvas 绘制二维码
                const moduleCount = qr.getModuleCount();
                // 移动端优化：提高最小单元格大小，确保二维码清晰可扫描
                const MAX_SIZE = 300;
                const MIN_CELL_SIZE = 3;
                const cellSize = Math.max(MIN_CELL_SIZE, Math.floor(MAX_SIZE / moduleCount));
                const size = moduleCount * cellSize;

                // Canvas 尺寸保护，防止移动端内存溢出
                if (size > 4096) {
                    throw new Error('二维码尺寸超出限制，内容可能过长');
                }

                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');

                // 绘制白色背景
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, size, size);

                // 绘制二维码模块
                ctx.fillStyle = '#09090b';
                for (let row = 0; row < moduleCount; row++) {
                    for (let col = 0; col < moduleCount; col++) {
                        if (qr.isDark(row, col)) {
                            ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
                        }
                    }
                }

                wrapper.appendChild(canvas);

                // 点击二维码打开灯罩效果
                canvas.addEventListener('click', () => openLightbox(canvas));
            } catch (err) {
                // 安全创建错误消息
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.textContent = '二维码生成失败';

                const errorSmall = document.createElement('small');
                errorSmall.textContent = err.message || '内容过长或包含不支持的字符';

                errorDiv.appendChild(errorSmall);
                wrapper.appendChild(errorDiv);
                console.error('QRCode generation error:', err);
            }

            // 下载按钮事件
            downloadBtn.addEventListener('click', () => {
                const canvas = wrapper.querySelector('canvas');
                if (canvas) {
                    const link = document.createElement('a');
                    link.download = `qrcode-${index}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    showToast('图片已下载');
                }
            });

            // 点击链接也可复制
            linkSpan.addEventListener('click', () => copyToClipboard(text));
            // 键盘支持：Enter 键复制
            linkSpan.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    copyToClipboard(text);
                }
            });

            return item;
        }

        function generateQR() {
            const text = inputEl.value.trim();

            if (!text) {
                showToast('请输入订阅链接');
                return;
            }

            // 分割多行
            const links = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);

            if (links.length === 0) {
                showToast('请输入有效的链接');
                return;
            }

            // 清空结果区域
            resultArea.innerHTML = '';
            resultArea.classList.add('active');

            // 使用 DocumentFragment 批量插入，减少 DOM 回流
            const fragment = document.createDocumentFragment();
            links.forEach((link, idx) => {
                const qrItem = createQRItem(link, idx + 1, links.length);
                fragment.appendChild(qrItem);
            });
            resultArea.appendChild(fragment);
        }

        btnEl.addEventListener('click', generateQR);

        // 清空按钮
        const clearBtnEl = document.getElementById('clear-btn');
        clearBtnEl.addEventListener('click', () => {
            inputEl.value = '';
            resultArea.innerHTML = '';
            resultArea.classList.remove('active');
            inputEl.focus();
        });

        // 支持 Ctrl+Enter 提交
        inputEl.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                generateQR();
            }
        });

        // 粘贴按钮功能
        const pasteBtn = document.getElementById('paste-btn');
        pasteBtn.addEventListener('click', async () => {
            try {
                const clipText = await navigator.clipboard.readText();
                if (clipText) {
                    const trimmedClip = clipText.trim();
                    if (!trimmedClip) {
                        showToast('剪贴板内容为空');
                        return;
                    }
                    // 如果输入框已有内容，智能追加
                    const currentValue = inputEl.value;
                    if (currentValue.trim()) {
                        // 检查末尾是否已有换行
                        const endsWithNewline = currentValue.endsWith('\n');
                        inputEl.value = endsWithNewline
                            ? currentValue + trimmedClip
                            : currentValue + '\n' + trimmedClip;
                    } else {
                        inputEl.value = trimmedClip;
                    }
                    showToast('已从剪贴板粘贴');
                    inputEl.focus();
                } else {
                    showToast('剪贴板为空');
                }
            } catch (err) {
                // 权限被拒绝或不支持
                showToast('无法访问剪贴板，请手动粘贴');
            }
        });
    </script>
</body>
