<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- 主渐变：青色到紫色 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <!-- 背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#09090b;stop-opacity:1" />
    </linearGradient>
    <!-- 发光效果 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 圆角背景 -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bgGradient)" stroke="url(#mainGradient)" stroke-width="2"/>

  <!-- 二维码图案 -->
  <g fill="url(#mainGradient)" filter="url(#glow)">
    <!-- 左上角定位图案 -->
    <rect x="20" y="20" width="28" height="28" rx="4"/>
    <rect x="26" y="26" width="16" height="16" rx="2" fill="#09090b"/>
    <rect x="30" y="30" width="8" height="8" rx="1" fill="url(#mainGradient)"/>

    <!-- 右上角定位图案 -->
    <rect x="80" y="20" width="28" height="28" rx="4"/>
    <rect x="86" y="26" width="16" height="16" rx="2" fill="#09090b"/>
    <rect x="90" y="30" width="8" height="8" rx="1" fill="url(#mainGradient)"/>

    <!-- 左下角定位图案 -->
    <rect x="20" y="80" width="28" height="28" rx="4"/>
    <rect x="26" y="86" width="16" height="16" rx="2" fill="#09090b"/>
    <rect x="30" y="90" width="8" height="8" rx="1" fill="url(#mainGradient)"/>

    <!-- 中间数据区域 -->
    <rect x="56" y="20" width="8" height="8" rx="1"/>
    <rect x="56" y="36" width="8" height="8" rx="1"/>
    <rect x="20" y="56" width="8" height="8" rx="1"/>
    <rect x="36" y="56" width="8" height="8" rx="1"/>
    <rect x="56" y="56" width="16" height="16" rx="2"/>
    <rect x="80" y="56" width="8" height="8" rx="1"/>
    <rect x="96" y="56" width="8" height="8" rx="1"/>
    <rect x="56" y="80" width="8" height="8" rx="1"/>
    <rect x="72" y="80" width="8" height="8" rx="1"/>
    <rect x="80" y="80" width="28" height="28" rx="4"/>
    <rect x="86" y="86" width="16" height="16" rx="2" fill="#09090b"/>
    <rect x="90" y="90" width="8" height="8" rx="1" fill="url(#mainGradient)"/>
    <rect x="56" y="96" width="8" height="8" rx="1"/>
  </g>
</svg>
